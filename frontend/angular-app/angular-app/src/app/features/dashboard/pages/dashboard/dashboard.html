<div class="dashboard">
  <section class="hero-card">
    <div>
      <span class="pill">✨ Panel NutriConPlus</span>
      <h1>Dashboard</h1>
      <p>Control visual de productos, stock, ventas y cuadres.</p>
    </div>

    <div class="hero-icon">🐾</div>
  </section>

  <section class="stats">
    <article class="stat-card green">
      <span>📦 Productos</span>
      <strong>—</strong>
      <p>Catálogo activo</p>
    </article>

    <article class="stat-card orange">
      <span>🧮 Stock</span>
      <strong>—</strong>
      <p>Inventario disponible</p>
    </article>

    <article class="stat-card blue">
      <span>🛒 Ventas</span>
      <strong>—</strong>
      <p>Ventas registradas</p>
    </article>

    <article class="stat-card purple">
      <span>🧾 Cuadres</span>
      <strong>—</strong>
      <p>Control financiero</p>
    </article>
  </section>

  <section class="grid">
    <article class="glass-card wide">
      <h3>Actividad mensual</h3>
      <div class="bars">
        <span style="height: 45%"></span>
        <span style="height: 70%"></span>
        <span style="height: 55%"></span>
        <span style="height: 85%"></span>
        <span style="height: 60%"></span>
        <span style="height: 75%"></span>
        <span style="height: 50%"></span>
      </div>
    </article>

    <article class="glass-card">
      <h3>Accesos rápidos</h3>
      <button routerLink="/productos">📦 Nuevo producto</button>
      <button routerLink="/ventas">🛒 Registrar venta</button>
      <button>Cuadre diario</button>
    </article>
  </section>
</div>
